<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>وصلّي - بوابة المطعم</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>" />
  <style>
    #wssely-splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #FF6B00;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #wssely-splash.hidden { opacity: 0; pointer-events: none; }

    .splash-glow {
      position: absolute;
      width: 120vw; height: 120vw;
      border-radius: 50%;
      background: #FF8C00;
      opacity: 0.2;
      top: -30vw; left: -10vw;
    }

    .splash-logo {
      width: 130px; height: 130px;
      border-radius: 24px;
      object-fit: cover;
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
      opacity: 0;
    }

    .splash-name {
      font-size: 54px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.15);
      margin: 0 0 8px;
      animation: fadeUp 0.4s ease 0.4s forwards;
      opacity: 0;
    }

    .splash-tag {
      font-size: 17px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 48px;
      animation: fadeUp 0.4s ease 0.7s forwards;
      opacity: 0;
    }

    .splash-bar-track {
      width: 55vw; max-width: 280px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      overflow: hidden;
    }

    .splash-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0;
      animation: fillBar 0.9s ease 0.9s forwards;
    }

    .splash-bottom {
      position: absolute;
      bottom: 48px;
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      animation: fadeUp 0.4s ease 0.7s forwards;
      opacity: 0;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fillBar {
      from { width: 0; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Animated Splash -->
  <div id="wssely-splash">
    <div class="splash-glow"></div>
    <img class="splash-logo" src="/icons/mat3m-icon.png" onerror="this.style.display='none'" />
    <h1 class="splash-name">وصالي</h1>
    <p class="splash-tag">بوابة المطعم 🍽️</p>
    <div class="splash-bar-track">
      <div class="splash-bar-fill"></div>
    </div>
    <span class="splash-bottom">wssely restaurant</span>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Hide splash after animations complete (~2s)
    setTimeout(() => {
      const s = document.getElementById('wssely-splash');
      if (s) {
        s.classList.add('hidden');
        setTimeout(() => s.remove(), 450);
      }
    }, 2200);
  </script>
</body>
</html>
