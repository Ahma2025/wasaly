version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: wasaly
      POSTGRES_USER: wasaly_user
      POSTGRES_PASSWORD: wasaly_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://wasaly_user:wasaly_pass@db:5432/wasaly
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  admin:
    build: ./admin-dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

  restaurant:
    build: ./restaurant-portal
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  pgdata:
