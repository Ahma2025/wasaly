name: Android All Apps → AAB

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: android-aab
  cancel-in-progress: true

jobs:
  build-all:
    name: Build All 4 Android AABs (signed)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Write upload keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 --decode > $RUNNER_TEMP/wasaly-upload.keystore
          echo "KEYSTORE_PATH=$RUNNER_TEMP/wasaly-upload.keystore" >> $GITHUB_ENV

      # ─── CUSTOMER APP (Expo — committed android folder) ─────────────────────
      - name: "[Customer] Install"
        working-directory: customer-app
        run: npm install --legacy-peer-deps

      - name: "[Customer] Build signed AAB"
        working-directory: customer-app/android
        env:
          ORG_GRADLE_PROJECT_WASALY_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_WASALY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_WASALY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_WASALY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Customer-AAB
          path: customer-app/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ─── DRIVER APP (Expo — committed android folder) ───────────────────────
      - name: "[Driver] Install"
        working-directory: driver-app
        run: npm install --legacy-peer-deps

      - name: "[Driver] Build signed AAB"
        working-directory: driver-app/android
        env:
          ORG_GRADLE_PROJECT_WASALY_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_WASALY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_WASALY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_WASALY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Driver-AAB
          path: driver-app/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ─── ADMIN DASHBOARD (Capacitor) ────────────────────────────────────────
      - name: "[Admin] Install & Build web"
        working-directory: admin-dashboard
        run: |
          npm install --legacy-peer-deps
          npm run build
          npx cap sync android

      - name: "[Admin] Build signed AAB"
        working-directory: admin-dashboard/android
        env:
          ORG_GRADLE_PROJECT_WASALY_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_WASALY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_WASALY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_WASALY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Admin-AAB
          path: admin-dashboard/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ─── RESTAURANT PORTAL (Capacitor) ──────────────────────────────────────
      - name: "[Restaurant] Install & Build web"
        working-directory: restaurant-portal
        run: |
          npm install --legacy-peer-deps
          npm run build
          npx cap sync android

      - name: "[Restaurant] Build signed AAB"
        working-directory: restaurant-portal/android
        env:
          ORG_GRADLE_PROJECT_WASALY_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_WASALY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_WASALY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_WASALY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Restaurant-AAB
          path: restaurant-portal/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
